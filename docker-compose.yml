version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=dev-secret-key-change-in-production
      - FLASK_DEBUG=1
    volumes:
      - ./backend:/app
    command: flask run --host=0.0.0.0
    restart: unless-stopped
